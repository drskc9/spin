<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Choice Generator</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --font: 'Hack', 'Courier New', Courier, monospace;
        }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        ::selection {
            background: var(--fg);
            color: var(--bg);
        }
        h1 {
            font-size: 24px;
            border-bottom: 2px solid var(--fg);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .tab {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--fg);
            padding: 10px 20px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .tab.active, .tab:hover {
            background: var(--fg);
            color: var(--bg);
        }
        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        .view.active {
            display: flex;
        }
        .wheel-container {
            position: relative;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1;
        }
        canvas {
            border-radius: 50%;
            border: 2px solid var(--fg);
            width: 100%;
            height: 100%;
        }
        .pointer {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 30px solid var(--fg);
            z-index: 10;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        textarea {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--fg);
            font-family: var(--font);
            padding: 10px;
            resize: vertical;
            height: 100px;
            outline: none;
        }
        textarea:focus {
            box-shadow: 0 0 5px var(--fg);
        }
        button.action-btn {
            background: var(--bg);
            color: var(--fg);
            border: 2px solid var(--fg);
            padding: 15px;
            font-family: var(--font);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        button.action-btn:hover {
            background: var(--fg);
            color: var(--bg);
        }
        button.action-btn:active {
            transform: scale(0.98);
        }
        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 30px;
            text-align: center;
            word-break: break-all;
        }
        .result-label {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        /* Coin Toss Styles */
        .coin-container {
            perspective: 1000px;
            margin: 40px 0;
        }
        .coin {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
        }
        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px dashed var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            backface-visibility: hidden;
            background: var(--bg);
            color: var(--fg);
            box-sizing: border-box;
        }
        .coin-face.back {
            transform: rotateX(180deg);
        }
    </style>
</head>
<body>
    <h1>> Random_Choice_Generator<span class="blink">_</span></h1>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('wheel')">[ Spin Wheel ]</button>
        <button class="tab" onclick="switchTab('coin')">[ Coin Toss ]</button>
    </div>

    <!-- Wheel View -->
    <div id="view-wheel" class="view active">
        <div class="wheel-container">
            <canvas id="wheel" width="400" height="400"></canvas>
            <div class="pointer"></div>
        </div>
        <div class="controls">
            <label for="wheel-options">> Custom Options (one per line):</label>
            <textarea id="wheel-options">Yes
No</textarea>
            <button class="action-btn" onclick="spinWheel()">[ SPIN ]</button>
            <div style="text-align: center;">
                <div class="result-label">RESULT:</div>
                <div id="wheel-result" class="result">...</div>
            </div>
        </div>
    </div>

    <!-- Coin View -->
    <div id="view-coin" class="view">
        <div class="coin-container">
            <div class="coin" id="coin">
                <div class="coin-face front">HEADS</div>
                <div class="coin-face back">TAILS</div>
            </div>
        </div>
        <div class="controls">
            <button class="action-btn" onclick="tossCoin()">[ TOSS ]</button>
            <div style="text-align: center;">
                <div class="result-label">RESULT:</div>
                <div id="coin-result" class="result">...</div>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('view-' + tabId).classList.add('active');
        }

        // Wheel Logic
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const optionsInput = document.getElementById('wheel-options');
        const wheelResult = document.getElementById('wheel-result');
        let options = [];
        let currentRotation = 0;
        let isSpinning = false;

        function updateWheel() {
            options = optionsInput.value.split('\n').map(o => o.trim()).filter(o => o !== '');
            if (options.length === 0) options = ['Empty'];
            drawWheel();
        }

        function drawWheel() {
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 4;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < numOptions; i++) {
                const angle = i * arcSize;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize, false);
                ctx.closePath();

                let fillColor = i % 2 === 0 ? '#ffffff' : '#000000';
                let textColor = i % 2 === 0 ? '#000000' : '#ffffff';

                if (numOptions % 2 !== 0 && i === numOptions - 1) {
                    fillColor = '#333333';
                    textColor = '#ffffff';
                }

                ctx.fillStyle = fillColor;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = textColor;
                ctx.font = 'bold 20px Hack, Courier New, monospace';
                
                let text = options[i];
                if (text.length > 18) text = text.substring(0, 15) + '...';
                ctx.fillText(text, radius - 15, 0);
                ctx.restore();
            }
        }

        optionsInput.addEventListener('input', updateWheel);
        updateWheel();

        function spinWheel() {
            if (isSpinning || options.length === 0) return;
            isSpinning = true;
            wheelResult.innerText = 'SPINNING...';

            const spinAngle = Math.floor(Math.random() * 360) + 1440;
            currentRotation += spinAngle;

            canvas.style.transition = 'transform 3s cubic-bezier(0.25, 0.1, 0.25, 1)';
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const normalizedRotation = currentRotation % 360;
                const arcSizeDeg = 360 / options.length;
                const winningIndex = Math.floor(((360 - normalizedRotation) % 360) / arcSizeDeg);
                wheelResult.innerText = '> ' + options[winningIndex];
                isSpinning = false;
            }, 3000);
        }

        // Coin Toss Logic
        const coin = document.getElementById('coin');
        const coinResult = document.getElementById('coin-result');
        let coinRotation = 0;
        let isTossing = false;

        function tossCoin() {
            if (isTossing) return;
            isTossing = true;
            coinResult.innerText = 'TOSSING...';

            const isHeads = Math.random() > 0.5;
            let targetRotation = coinRotation + 1800;

            if (isHeads && targetRotation % 360 !== 0) {
                targetRotation += 180;
            } else if (!isHeads && targetRotation % 360 === 0) {
                targetRotation += 180;
            }

            coinRotation = targetRotation;
            coin.style.transition = 'transform 2s cubic-bezier(0.25, 0.1, 0.25, 1)';
            coin.style.transform = `rotateX(${coinRotation}deg)`;

            setTimeout(() => {
                coinResult.innerText = '> ' + (isHeads ? 'HEADS' : 'TAILS');
                isTossing = false;
            }, 2000);
        }
    </script>
</body>
</html>
